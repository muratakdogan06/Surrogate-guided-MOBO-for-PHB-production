# ============================================================================
# environment.yml — Conda environment for the PHA optimisation pipeline
# ============================================================================
# Usage:
#   conda env create -f environment.yml
#   conda activate phaopt
# ============================================================================
name: phaopt
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pyarrow>=14.0
  - pyyaml>=6.0
  - joblib>=1.3
  - xgboost>=2.0
  - pip:
      - cobra>=0.29.0
      - shap>=0.42.0
